<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAWN WIRE — {{DATE_KOR}} 브리핑</title>
<meta name="description" content="패션, 뷰티, 유통, AI, 테크, 아트 — 새벽까지의 뉴스를 매일 아침 8시에 요약합니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Noto+Serif+KR:wght@500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --paper:#FAF7F2;
    --paper-dim:#F1ECE2;
    --ink:#1A1A18;
    --ink-soft:#5B5750;
    --rule:#DCD5C7;
    --signal:#C4293E;
    --c-fashion:#B08B3D;
    --c-beauty:#C97B84;
    --c-retail:#4B6E58;
    --c-ai:#3B5BA5;
    --c-tech:#445263;
    --c-art:#8B3A62;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Pretendard', -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  .wrap{max-width:760px;margin:0 auto;padding:0 20px;}

  /* Masthead */
  .masthead{border-bottom:3px solid var(--ink);padding:28px 0 16px;}
  .masthead-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  .wordmark{
    font-family:'Noto Serif KR','Fraunces',serif;
    font-weight:700;
    font-size:clamp(28px,6vw,40px);
    letter-spacing:-0.01em;
    margin:0;
    line-height:1;
  }
  .wordmark em{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:500;
    color:var(--signal);
  }
  .stamp{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.06em;
    border:1.5px solid var(--ink);
    color:var(--ink);
    padding:6px 10px;
    transform:rotate(-2deg);
    white-space:nowrap;
  }
  .dateline{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    margin-top:10px;
    text-transform:uppercase;
  }
  .tagline{
    font-size:14px;
    color:var(--ink-soft);
    margin-top:6px;
  }

  /* Category nav */
  .catnav{
    display:flex;flex-wrap:wrap;gap:0;
    border-bottom:1px solid var(--rule);
  }
  .catnav a{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.03em;
    text-decoration:none;
    padding:12px 14px;
    color:var(--ink-soft);
    border-right:1px solid var(--rule);
  }
  .catnav a:last-child{border-right:none;}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;position:relative;top:-1px;}

  /* Section */
  .section{padding:36px 0 8px;border-bottom:1px solid var(--rule);}
  .section:last-of-type{border-bottom:none;}
  .section-head{display:flex;align-items:baseline;gap:10px;margin-bottom:18px;}
  .section-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .section-count{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
  }
  .section-rule{flex:1;height:1px;background:var(--rule);}

  .story{padding:16px 0;border-top:1px solid var(--rule);}
  .story:first-child{border-top:none;padding-top:0;}
  .story-head{display:flex;gap:12px;align-items:baseline;}
  .story-index{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    flex-shrink:0;
    padding-top:3px;
  }
  .story-title{
    font-family:'Noto Serif KR',serif;
    font-weight:700;
    font-size:18px;
    line-height:1.4;
    margin:0;
  }
  .story-title a{text-decoration:none;}
  .story-title a:hover{text-decoration:underline;text-decoration-color:var(--rule);}
  .story-summary{
    font-size:14.5px;
    line-height:1.7;
    color:var(--ink-soft);
    margin:6px 0 0 26px;
  }
  .story-source{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin:6px 0 0 26px;
    opacity:0.8;
  }

  footer{
    padding:32px 0 60px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:center;
    border-top:3px solid var(--ink);
    margin-top:12px;
  }
  footer a{text-decoration:underline;}

  @media (max-width:480px){
    .stamp{transform:rotate(0deg);}
    .story-summary,.story-source{margin-left:0;}
    .story-head{flex-direction:column;gap:2px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="masthead-top">
      <h1 class="wordmark">DAWN <em>WIRE</em></h1>
      <div class="stamp">08:00 KST 발행</div>
    </div>
    <div class="dateline">SEOUL — {{DATE_KOR}} · 새벽까지 수집된 뉴스 요약</div>
    <div class="tagline">패션 · 뷰티 · 유통 · AI · 테크 · 아트, 여섯 개의 관점으로 아침을 엽니다.</div>
  </header>

  <nav class="catnav">
    <a href="#fashion"><span class="dot" style="background:var(--c-fashion)"></span>FASHION</a>
    <a href="#beauty"><span class="dot" style="background:var(--c-beauty)"></span>BEAUTY</a>
    <a href="#retail"><span class="dot" style="background:var(--c-retail)"></span>RETAIL</a>
    <a href="#ai"><span class="dot" style="background:var(--c-ai)"></span>AI</a>
    <a href="#tech"><span class="dot" style="background:var(--c-tech)"></span>TECH</a>
    <a href="#art"><span class="dot" style="background:var(--c-art)"></span>ART</a>
  </nav>

  {{SECTIONS}}

  <footer>
    DAWN WIRE는 매일 08:00 KST에 자동으로 업데이트됩니다.<br>
    지난 브리핑은 <a href="./archive/">아카이브</a>에서 볼 수 있습니다.
  </footer>

</div>
</body>
</html>
