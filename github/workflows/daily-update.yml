name: Daily News Brief

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        run: npm install

      - name: 뉴스 수집 및 사이트 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.mjs

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "dawn-wire-bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: 아침 브리핑 업데이트 $(date -u +%Y-%m-%d)"
          git push
